name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.1'

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22.17.0'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        chmod +x scripts/*.sh
        ./scripts/install_deps.sh

    - name: Build Project
      id: build
      env:
        # 增加内存防止打包 OOM
        NODE_OPTIONS: "--max-old-space-size=4096"
        FUTURECODER_LANGUAGE: zh # 改为 zh 获取中文关卡，如需英文改回 en
        REACT_APP_SENTRY_DSN: https://37b1f01452b54bf4a0fe88656070998f@o871617.ingest.sentry.io/5824691
      run: ./scripts/build.sh

    - name: Locate Build Output
      # 这一步会自动找到 index.html 所在的目录并存入环境变量
      id: locate
      run: |
        BUILD_PATH=$(find . -name "index.html" -path "*/build/*" -o -path "*/dist/*" | head -n 1 | xidir=$(xargs dirname))
        if [ -z "$BUILD_PATH" ]; then
          # 如果上面没找到，尝试万能搜索
          BUILD_PATH=$(find . -name "index.html" | head -n 1 | xargs dirname)
        fi
        echo "Found build at: $BUILD_PATH"
        echo "path=$BUILD_PATH" >> $GITHUB_OUTPUT

    - name: Upload Ready-to-Play Build
      uses: actions/upload-artifact@v4
      with:
        name: futurecoder-games-package
        # 使用上一步自动找出来的路径
        path: ${{ steps.locate.outputs.path }}
        if-no-files-found: error

    # 注释掉耗时的测试步骤，直接出包
    # - name: Test
    #   run: ./scripts/ci_test.sh
